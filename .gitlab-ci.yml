# GitLab CI: build the OpenClaw image with csgclaw-extension baked in and
# push it to Alibaba Cloud ACR.
#
# Runner: docker executor + privileged dind.
#
# Required CI/CD variables:
#   ACR_REGISTRY, ACR_USERNAME, ACR_PASSWORD
#
# Optional CI/CD variables:
#   CI_IMAGE_REGISTRY    registry for public CI helper images
#   CSGCLAW_CLI_BASE_URL csgclaw-cli release endpoint
#   DOCKER_PLATFORMS      buildx platforms, e.g. linux/amd64,linux/arm64
#   EXTRA_TAGS            additional image tags separated by spaces
#   OPENCLAW_UPSTREAM_IMAGE upstream OpenClaw slim image used for base builds
#   OPENCLAW_BASE_IMAGE   pre-baked OpenClaw+CSGClaw runtime base image
#   OPENCLAW_BASE_TAG     tag for the default pre-baked runtime base image
#   OPENCLAW_FEISHU_VERSION Feishu plugin npm version (defaults to OPENCLAW_BASE_VERSION)
#   CSGCLAW_EXTENSION_VERSION csgclaw-extension npm version (defaults to 0.3.9-ext.2)
#   SKIP_BINFMT_INSTALL   set true when the runner host already has qemu
#
# Trigger: push a Git tag. The exact Git tag is used as the Docker image tag,
# so use Docker-compatible tag names such as 20260525.1-csgclaw or v0.1.0.

variables:
  CI_IMAGE_REGISTRY: "opencsg-registry.cn-beijing.cr.aliyuncs.com"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"
  OPENCLAW_BASE_VERSION: "2026.5.26"
  CSGCLAW_EXTENSION_VERSION: "0.3.9-ext.2"
  OPENCLAW_BASE_REPO: "opencsghq/openclaw-csgclaw-base"
  CSGCLAW_CLI_BASE_URL: "https://csgclaw.opencsg.com/releases/latest"
  CI_DOCKER_IMAGE: "${CI_IMAGE_REGISTRY}/opencsg_public/docker:27.3"
  CI_DIND_IMAGE: "${CI_IMAGE_REGISTRY}/opencsg_public/docker:27.3-dind"
  BINFMT_IMAGE: "${CI_IMAGE_REGISTRY}/opencsg_public/binfmt:latest"
  BUILDKIT_CI_IMAGE: "${CI_IMAGE_REGISTRY}/opencsg_public/moby-buildkit:buildx-stable-1"

stages:
  - build

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always
    - when: never

docker-build-push:
  stage: build
  image:
    name: "$CI_DOCKER_IMAGE"
    entrypoint: [""]
  services:
    - name: "$CI_DIND_IMAGE"
      command: ["--feature=containerd-snapshotter", "--experimental"]
      alias: docker
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - export TZ=Asia/Shanghai
    - sed -i 's/dl-cdn.alpinelinux.org/mirrors.aliyun.com/g' /etc/apk/repositories
    - apk add --no-cache ca-certificates coreutils curl
    - ': "${ACR_REGISTRY:?ACR_REGISTRY is required}"'
    - ': "${ACR_USERNAME:?ACR_USERNAME is required}"'
    - ': "${ACR_PASSWORD:?ACR_PASSWORD is required}"'
    - echo "$ACR_PASSWORD" | docker login -u "$ACR_USERNAME" --password-stdin "$ACR_REGISTRY"
    - export IMAGE_TAG="${CI_COMMIT_TAG}"
    - |
      set -euo pipefail
      if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
        echo "Git tag '${IMAGE_TAG}' is not a valid Docker tag." >&2
        echo "Use only letters, digits, underscore, dot, and dash; do not use slash." >&2
        exit 1
      fi
      for tag in ${EXTRA_TAGS:-}; do
        if ! printf '%s' "${tag}" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
          echo "EXTRA_TAGS entry '${tag}' is not a valid Docker tag." >&2
          echo "Use only letters, digits, underscore, dot, and dash; do not use slash." >&2
          exit 1
        fi
      done
    - export DOCKER_IMAGE="${ACR_REGISTRY}/opencsghq/openclaw"
    - export OPENCLAW_UPSTREAM_IMAGE="${OPENCLAW_UPSTREAM_IMAGE:-ghcr.io/openclaw/openclaw:${OPENCLAW_BASE_VERSION}-slim}"
    - export OPENCLAW_BASE_TAG="${OPENCLAW_BASE_TAG:-${OPENCLAW_BASE_VERSION}-node24-pnpm10-py3}"
    - export OPENCLAW_BASE_IMAGE="${OPENCLAW_BASE_IMAGE:-${ACR_REGISTRY}/${OPENCLAW_BASE_REPO}:${OPENCLAW_BASE_TAG}}"
    - export OPENCLAW_FEISHU_VERSION="${OPENCLAW_FEISHU_VERSION:-${OPENCLAW_BASE_VERSION}}"
    - export CSGCLAW_EXTENSION_VERSION="${CSGCLAW_EXTENSION_VERSION:-0.3.9-ext.2}"
    - echo "IMAGE_TAG=${IMAGE_TAG}" && echo "DOCKER_IMAGE=${DOCKER_IMAGE}"
    - echo "OPENCLAW_UPSTREAM_IMAGE=${OPENCLAW_UPSTREAM_IMAGE}"
    - echo "OPENCLAW_BASE_IMAGE=${OPENCLAW_BASE_IMAGE}"
    - echo "OPENCLAW_FEISHU_VERSION=${OPENCLAW_FEISHU_VERSION}"
    - echo "CSGCLAW_EXTENSION_VERSION=${CSGCLAW_EXTENSION_VERSION}"
    - docker info
    - docker buildx version
    - |
      set -euo pipefail
      mkdir -p docker/csgclaw-cli
      for arch in amd64 arm64; do
        archive="/tmp/csgclaw-cli-${arch}.tar.gz"
        extract_dir="/tmp/csgclaw-cli-${arch}"
        echo "Downloading csgclaw-cli linux/${arch} from ${CSGCLAW_CLI_BASE_URL}"
        curl -fSL "${CSGCLAW_CLI_BASE_URL}/linux/${arch}?package=csgclaw-cli" -o "${archive}"
        rm -rf "${extract_dir}"
        mkdir -p "${extract_dir}"
        tar -xzf "${archive}" -C "${extract_dir}"
        bin="$(find "${extract_dir}" -type f \( -name csgclaw-cli -o -name "csgclaw-cli_linux_${arch}" \) | head -n1)"
        if [ -z "${bin}" ]; then
          bin="$(find "${extract_dir}" -type f -perm -111 | head -n1)"
        fi
        if [ -z "${bin}" ]; then
          echo "csgclaw-cli binary not found in ${archive}" >&2
          find "${extract_dir}" -maxdepth 3 -type f -print >&2
          exit 1
        fi
        install -m0755 "${bin}" "docker/csgclaw-cli/csgclaw-cli_linux_${arch}"
      done
      test -s docker/csgclaw-cli/csgclaw-cli_linux_amd64
      test -s docker/csgclaw-cli/csgclaw-cli_linux_arm64
    - |
      set -eu
      if [ "${SKIP_BINFMT_INSTALL:-}" = "true" ] || [ "${SKIP_BINFMT_INSTALL:-}" = "1" ]; then
        echo "SKIP_BINFMT_INSTALL: skip binfmt container"
      else
        echo "Installing binfmt from ${BINFMT_IMAGE}"
        docker run --rm --privileged "${BINFMT_IMAGE}" --install all
      fi
    - export BUILDX_BUILDER="csgclaw-extension-mx-${CI_PIPELINE_ID}"
    - docker buildx rm "${BUILDX_BUILDER}" 2>/dev/null || true
    - echo "BuildKit image for buildx driver ${BUILDKIT_CI_IMAGE}"
    - docker buildx create --name "${BUILDX_BUILDER}" --driver docker-container --driver-opt "image=${BUILDKIT_CI_IMAGE}" --bootstrap --use
    - |
      set -euo pipefail
      base_ready=false
      if docker buildx imagetools inspect "${OPENCLAW_BASE_IMAGE}" > /tmp/openclaw-base-manifest.txt 2>/tmp/openclaw-base-inspect.err; then
        if grep -Eq 'Platform:[[:space:]]+linux/amd64' /tmp/openclaw-base-manifest.txt \
          && grep -Eq 'Platform:[[:space:]]+linux/arm64' /tmp/openclaw-base-manifest.txt; then
          base_ready=true
          echo "Using existing OpenClaw CSGClaw base image: ${OPENCLAW_BASE_IMAGE}"
        else
          echo "Existing base image is missing a required platform: ${OPENCLAW_BASE_IMAGE}" >&2
        fi
      else
        cat /tmp/openclaw-base-inspect.err >&2 || true
      fi
      if [ "${base_ready}" != "true" ]; then
        echo "Base image missing or incomplete; building ${OPENCLAW_BASE_IMAGE} from ${OPENCLAW_UPSTREAM_IMAGE}"
        docker buildx build \
          --platform "${DOCKER_PLATFORMS}" \
          --build-arg "OPENCLAW_UPSTREAM_IMAGE=${OPENCLAW_UPSTREAM_IMAGE}" \
          -t "${OPENCLAW_BASE_IMAGE}" \
          --provenance=false \
          --sbom=false \
          --push \
          -f Dockerfile.base \
          .
        docker buildx imagetools inspect "${OPENCLAW_BASE_IMAGE}" > /tmp/openclaw-base-manifest.txt
      fi
      grep -Eq 'Platform:[[:space:]]+linux/amd64' /tmp/openclaw-base-manifest.txt
      grep -Eq 'Platform:[[:space:]]+linux/arm64' /tmp/openclaw-base-manifest.txt
  script:
    - |
      set -euo pipefail
      tag_args="-t ${DOCKER_IMAGE}:${IMAGE_TAG}"
      for tag in ${EXTRA_TAGS:-}; do
        tag_args="${tag_args} -t ${DOCKER_IMAGE}:${tag}"
      done
      docker buildx build \
        --platform "${DOCKER_PLATFORMS}" \
        --build-arg "OPENCLAW_BASE_IMAGE=${OPENCLAW_BASE_IMAGE}" \
        --build-arg "OPENCLAW_FEISHU_VERSION=${OPENCLAW_FEISHU_VERSION}" \
        --build-arg "CSGCLAW_EXTENSION_VERSION=${CSGCLAW_EXTENSION_VERSION}" \
        ${tag_args} \
        --provenance=false \
        --sbom=false \
        --push \
        .
    - |
      set -euo pipefail
      docker buildx imagetools inspect "${DOCKER_IMAGE}:${IMAGE_TAG}"
      for entry in "linux/amd64:x86_64" "linux/arm64:aarch64"; do
        platform="${entry%%:*}"
        expected_arch="${entry##*:}"
        echo "Validating ${DOCKER_IMAGE}:${IMAGE_TAG} on ${platform}"
        docker run --rm --platform "${platform}" --entrypoint /bin/sh "${DOCKER_IMAGE}:${IMAGE_TAG}" -ec "
          test \"\$(uname -m)\" = \"${expected_arch}\"
          python --version >/dev/null
          node --version >/dev/null
          node /app/openclaw.mjs --version >/dev/null
          /usr/local/bin/csgclaw-cli --help >/dev/null 2>&1
          test -f /home/node/openclaw-plugins/csgclaw-extension/dist/index.js
          test -f /home/node/openclaw-plugins/csgclaw-extension/openclaw.plugin.json
          test -L /home/node/openclaw-plugins/csgclaw-extension/node_modules/openclaw
          test \"\$(readlink /home/node/openclaw-plugins/csgclaw-extension/node_modules/openclaw)\" = \"/app\"
          test -f /home/node/openclaw-plugins/feishu/dist/index.js
          test -f /home/node/openclaw-plugins/feishu/dist/setup-entry.js
          test -f /home/node/openclaw-plugins/feishu/openclaw.plugin.json
          test -L /home/node/openclaw-plugins/feishu/node_modules/openclaw
          test \"\$(readlink /home/node/openclaw-plugins/feishu/node_modules/openclaw)\" = \"/app\"
          node --input-type=module -e '
            import fs from \"node:fs\";
            const pkg = JSON.parse(fs.readFileSync(\"/home/node/openclaw-plugins/feishu/package.json\", \"utf8\"));
            if (pkg.openclaw?.extensions?.[0] !== \"./dist/index.js\") throw new Error(\"bad feishu extension entry\");
            if (pkg.openclaw?.setupEntry !== \"./dist/setup-entry.js\") throw new Error(\"bad feishu setup entry\");
            await import(\"file:///home/node/openclaw-plugins/feishu/dist/index.js\");
          '
          node --input-type=module -e '
            const { loadOpenClawPlugins } = await import(\"/app/dist/plugins/loader.js\");
            const config = {
              channels: {
                csgclaw: { enabled: true, baseUrl: \"http://127.0.0.1:18080\", botId: \"ci\" },
                feishu: {
                  enabled: true,
                  defaultAccount: \"ci\",
                  accounts: { ci: { enabled: true, appId: \"cli_a_ci\", appSecret: \"ci-secret\" } }
                }
              },
              plugins: {
                load: { paths: [\"/home/node/openclaw-plugins\"] },
                entries: { csgclaw: { enabled: true }, feishu: { enabled: true } }
              }
            };
            const registry = loadOpenClawPlugins({ config, cache: false, throwOnLoadError: false, env: process.env });
            for (const id of [\"csgclaw\", \"feishu\"]) {
              const plugin = registry.plugins.find((entry) => entry.id === id);
              if (!plugin || plugin.status !== \"loaded\") throw new Error(id + \" not loaded: \" + (plugin?.error ?? \"missing\"));
            }
          '
        "
      done
  after_script:
    - docker buildx rm "csgclaw-extension-mx-${CI_PIPELINE_ID}" 2>/dev/null || true
