# GitLab CI: build Docker image and push to Alibaba Cloud ACR.
# Config path: .gitlab/ci.yml — set in Project → Settings → CI/CD → General pipelines
# → "CI/CD configuration file" (GitLab does not auto-detect this path).
#
# Runner: docker executor + privileged dind (see [runners.docker] privileged = true).
#
# Required CI/CD variables:
#   ACR_REGISTRY, ACR_USERNAME, ACR_PASSWORD
#
# Trigger: main branch push only.
# Tag format: YYYYMMDD.{pipeline_id}-csgclaw  (same-day multiple builds get unique IDs)

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"
  OPENCLAW_BASE_VERSION: "2026.5.26"
  OPENCLAW_FEISHU_VERSION: "2026.5.26"
  BASE_IMAGE_REPO: "opencsghq/openclaw-csgclaw-base"
  BASE_TAG: "2026.5.26-node24-pnpm10-py3"
  IMAGE_REPO: "opencsghq/openclaw"
  # BuildKit / binfmt mirrors on ACR to avoid Docker Hub timeouts in CN CI
  BINFMT_IMAGE: "${ACR_REGISTRY}/opencsg_public/binfmt:latest"
  BUILDKIT_CI_IMAGE: "${ACR_REGISTRY}/opencsg_public/moby-buildkit:buildx-stable-1"

stages:
  - prepare
  - build

# Stage 1: Build extension dist + csgclaw-cli binaries using base image
build-artifacts:
  stage: prepare
  image:
    name: ${ACR_REGISTRY}/${BASE_IMAGE_REPO}:${BASE_TAG}
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - git --version && go version && pnpm --version
  script:
    # Build extension dist
    - pnpm install --frozen-lockfile --registry https://registry.npmmirror.com
    - pnpm run build
    - echo "dist/ ready:" && ls -la dist/
    # Build csgclaw-cli for both architectures
    - git clone --depth 1 https://ghfast.top/https://github.com/OpenCSGs/csgclaw.git /tmp/csgclaw-src
    - cd /tmp/csgclaw-src
    - make build-server-bin TARGET_OS=linux TARGET_ARCH=amd64
    - make build-server-bin TARGET_OS=linux TARGET_ARCH=arm64
    - mkdir -p "${CI_PROJECT_DIR}/docker/csgclaw-cli"
    - cp bin/csgclaw-cli "${CI_PROJECT_DIR}/docker/csgclaw-cli/csgclaw-cli_linux_amd64"
    - cp bin/csgclaw-cli "${CI_PROJECT_DIR}/docker/csgclaw-cli/csgclaw-cli_linux_arm64"
    - echo "csgclaw-cli binaries ready:" && ls -la "${CI_PROJECT_DIR}/docker/csgclaw-cli/"
  artifacts:
    paths:
      - dist/
      - docker/csgclaw-cli/
    expire_in: 1 hour

# Stage 2: Build and push multi-arch Docker image
docker-build-push:
  stage: build
  image:
    name: ${ACR_REGISTRY}/opencsg_public/docker-ci:v1.0.1
    entrypoint: [""]
  services:
    - name: ${ACR_REGISTRY}/opencsg_public/docker:27.3-dind
      command: ["--feature=containerd-snapshotter", "--experimental"]
      alias: docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - build-artifacts
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - export TZ=Asia/Shanghai
    - echo "$ACR_PASSWORD" | docker login -u "$ACR_USERNAME" --password-stdin "$ACR_REGISTRY"
    # Auto-generate tag: YYYYMMDD.{CI_PIPELINE_IID}-csgclaw
    - export IMAGE_TAG="$(date +%Y%m%d).${CI_PIPELINE_IID}-csgclaw"
    - export DOCKER_IMAGE="${ACR_REGISTRY}/${IMAGE_REPO}"
    - echo "IMAGE_TAG=${IMAGE_TAG}" && echo "DOCKER_IMAGE=${DOCKER_IMAGE}"
    - docker info
    - docker buildx version
    # Install binfmt for cross-arch emulation
    - |
      set -eu
      if [ "${SKIP_BINFMT_INSTALL:-}" = "true" ] || [ "${SKIP_BINFMT_INSTALL:-}" = "1" ]; then
        echo "SKIP_BINFMT_INSTALL: skip binfmt container"
      else
        echo "Installing binfmt from ${BINFMT_IMAGE}"
        docker run --rm --privileged "${BINFMT_IMAGE}" --install all
      fi
    # Create buildx builder with ACR-hosted BuildKit image
    - export BUILDX_BUILDER="csgclaw-ext-${CI_PIPELINE_ID}"
    - docker buildx rm "${BUILDX_BUILDER}" 2>/dev/null || true
    - docker buildx create --name "${BUILDX_BUILDER}" --driver docker-container --driver-opt "image=${BUILDKIT_CI_IMAGE}" --bootstrap --use
    # Verify base image has both amd64 and arm64 manifests
    - |
      set -euo pipefail
      BASE_IMG="${ACR_REGISTRY}/${BASE_IMAGE_REPO}:${BASE_TAG}"
      echo "Checking base image platforms: ${BASE_IMG}"
      docker buildx imagetools inspect "${BASE_IMG}" | tee /tmp/base-manifest.txt
      grep -Eq 'Platform:[[:space:]]+linux/amd64' /tmp/base-manifest.txt
      grep -Eq 'Platform:[[:space:]]+linux/arm64' /tmp/base-manifest.txt
    - cd "${CI_PROJECT_DIR}"
    - echo "Artifacts from build-artifacts:"
    - ls -la dist/ docker/csgclaw-cli/
  script:
    - |
      set -euo pipefail
      docker buildx build \
        --platform "${DOCKER_PLATFORMS}" \
        -f docker/Dockerfile.ci \
        --build-arg OPENCLAW_BASE_IMAGE="${ACR_REGISTRY}/${BASE_IMAGE_REPO}:${BASE_TAG}" \
        --build-arg OPENCLAW_FEISHU_VERSION="${OPENCLAW_FEISHU_VERSION}" \
        -t "${DOCKER_IMAGE}:${IMAGE_TAG}" \
        --provenance=false \
        --sbom=false \
        --push \
        .
    - |
      set -euo pipefail
      docker buildx imagetools inspect "${DOCKER_IMAGE}:${IMAGE_TAG}"
      for entry in "linux/amd64:x86_64" "linux/arm64:aarch64"; do
        platform="${entry%%:*}"
        expected_arch="${entry##*:}"
        echo "Validating ${DOCKER_IMAGE}:${IMAGE_TAG} on ${platform}"
        docker run --rm --platform "${platform}" --entrypoint /bin/sh "${DOCKER_IMAGE}:${IMAGE_TAG}" -ec "
          test \"\$(uname -m)\" = \"${expected_arch}\"
          /sbin/tini --version >/dev/null
          /usr/local/bin/csgclaw-cli --help >/dev/null
        "
      done
  after_script:
    - docker buildx rm "csgclaw-ext-${CI_PIPELINE_ID}" 2>/dev/null || true
