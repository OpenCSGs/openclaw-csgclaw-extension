# GitLab CI: build Docker image and push to Alibaba Cloud ACR.
# Config path: .gitlab/ci.yml — set in Project → Settings → CI/CD → General pipelines
# → "CI/CD configuration file" (GitLab does not auto-detect this path).
#
# Runner: docker executor + privileged dind (see [runners.docker] privileged = true).
#
# Required CI/CD variables:
#   ACR_REGISTRY, ACR_USERNAME, ACR_PASSWORD
#
# Trigger: main branch push only.
# Tag format: YYYYMMDD.{daily_publish_number}-csgclaw
# The sequence resets every day in UTC+8 and counts images already published to ACR.

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  DOCKER_BUILDKIT: "1"
  BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
  DOCKER_PLATFORMS: "linux/amd64,linux/arm64"
  OPENCLAW_BASE_VERSION: "2026.5.26"
  OPENCLAW_FEISHU_VERSION: "2026.5.26"
  BASE_IMAGE_REPO: "opencsghq/openclaw-csgclaw-base"
  BASE_TAG: "2026.5.26-node24-pnpm10-py3"
  IMAGE_REPO: "opencsghq/openclaw"
  # BuildKit / binfmt mirrors on ACR to avoid Docker Hub timeouts in CN CI
  BINFMT_IMAGE: "${ACR_REGISTRY}/opencsg_public/binfmt:latest"
  BUILDKIT_CI_IMAGE: "${ACR_REGISTRY}/opencsg_public/moby-buildkit:buildx-stable-1"

stages:
  - build

# Single-stage pipeline: build dist, then buildx push.
docker-build-push:
  stage: build
  resource_group: openclaw-image-publish
  image:
    name: ${ACR_REGISTRY}/opencsg_public/docker-ci:v1.0.1
    entrypoint: [""]
  services:
    - name: ${ACR_REGISTRY}/opencsg_public/docker:27.3-dind
      command: ["--feature=containerd-snapshotter", "--experimental"]
      alias: docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - export TZ=Asia/Shanghai
    - ': "${ACR_REGISTRY:?ACR_REGISTRY is required}"'
    - ': "${ACR_USERNAME:?ACR_USERNAME is required}"'
    - ': "${ACR_PASSWORD:?ACR_PASSWORD is required}"'
    - echo "$ACR_PASSWORD" | docker login -u "$ACR_USERNAME" --password-stdin "$ACR_REGISTRY"
    - export DOCKER_IMAGE="${ACR_REGISTRY}/${IMAGE_REPO}"
    - |
      set -euo pipefail
      utc8_epoch=$(($(date +%s) + 8 * 60 * 60))
      image_date="$(date -u -d "@${utc8_epoch}" +%Y%m%d)"
      tags_url="https://${ACR_REGISTRY}/v2/${IMAGE_REPO}/tags/list?n=10000"
      auth_challenge="$(curl -sS -D - -o /dev/null "${tags_url}" \
        | tr -d '\r' \
        | awk 'tolower($1) == "www-authenticate:" { sub(/^[^:]+:[[:space:]]*/, ""); print; exit }')"
      realm="$(printf '%s\n' "${auth_challenge}" | sed -n 's/.*realm="\([^"]*\)".*/\1/p')"
      service="$(printf '%s\n' "${auth_challenge}" | sed -n 's/.*service="\([^"]*\)".*/\1/p')"
      scope="$(printf '%s\n' "${auth_challenge}" | sed -n 's/.*scope="\([^"]*\)".*/\1/p')"
      registry_token="$(curl -fsSG "${realm}" \
        --data-urlencode "service=${service}" \
        --data-urlencode "scope=${scope}" \
        | jq -er '.token // .access_token')"
      tags_json="$(curl -fsS -H "Authorization: Bearer ${registry_token}" "${tags_url}")"
      published_today="$(printf '%s' "${tags_json}" \
        | jq -r --arg date "${image_date}" \
          '[.tags[]? | select(test("^" + $date + "\\.[0-9]+-csgclaw$"))] | length')"
      image_sequence=$((published_today + 1))
      while printf '%s' "${tags_json}" \
        | jq -e --arg tag "${image_date}.${image_sequence}-csgclaw" \
          '.tags | index($tag) != null' >/dev/null; do
        image_sequence=$((image_sequence + 1))
      done
      export IMAGE_TAG="${image_date}.${image_sequence}-csgclaw"
      echo "Published images on ${image_date}: ${published_today}"
    - export BASE_IMG="${ACR_REGISTRY}/${BASE_IMAGE_REPO}:${BASE_TAG}"
    - echo "IMAGE_TAG=${IMAGE_TAG}" && echo "DOCKER_IMAGE=${DOCKER_IMAGE}"
    - echo "BASE_IMG=${BASE_IMG}"
    - docker info
    - docker buildx version
    # Build extension dist inside the runtime base image (Node 24 + pnpm preinstalled).
    # Run as root so workspace bind-mount files stay writable for later buildx steps.
    - |
      set -euo pipefail
      echo "Building extension dist with Node from ${BASE_IMG}"
      docker run --rm --user root \
        -v "${CI_PROJECT_DIR}:/work" -w /work \
        -e NPM_CONFIG_REGISTRY=https://registry.npmmirror.com \
        "${BASE_IMG}" \
        bash -lc 'pnpm --version && pnpm install --frozen-lockfile && pnpm run build'
      test -f dist/index.js
      echo "dist/ ready:" && ls -la dist/
    # Install binfmt for cross-arch emulation
    - |
      set -eu
      if [ "${SKIP_BINFMT_INSTALL:-}" = "true" ] || [ "${SKIP_BINFMT_INSTALL:-}" = "1" ]; then
        echo "SKIP_BINFMT_INSTALL: skip binfmt container"
      else
        echo "Installing binfmt from ${BINFMT_IMAGE}"
        docker run --rm --privileged "${BINFMT_IMAGE}" --install all
      fi
    # Create buildx builder with ACR-hosted BuildKit image
    - export BUILDX_BUILDER="csgclaw-ext-${CI_PIPELINE_ID}"
    - docker buildx rm "${BUILDX_BUILDER}" 2>/dev/null || true
    - docker buildx create --name "${BUILDX_BUILDER}" --driver docker-container --driver-opt "image=${BUILDKIT_CI_IMAGE}" --bootstrap --use
    # Verify base image has both amd64 and arm64 manifests
    - |
      set -euo pipefail
      echo "Checking base image platforms: ${BASE_IMG}"
      docker buildx imagetools inspect "${BASE_IMG}" | tee /tmp/base-manifest.txt
      grep -Eq 'Platform:[[:space:]]+linux/amd64' /tmp/base-manifest.txt
      grep -Eq 'Platform:[[:space:]]+linux/arm64' /tmp/base-manifest.txt
    - cd "${CI_PROJECT_DIR}"
    - echo "Build inputs ready:" && ls -la dist/
  script:
    - |
      set -euo pipefail
      docker buildx build \
        --platform "${DOCKER_PLATFORMS}" \
        -f docker/Dockerfile.ci \
        --build-arg OPENCLAW_BASE_IMAGE="${BASE_IMG}" \
        --build-arg OPENCLAW_FEISHU_VERSION="${OPENCLAW_FEISHU_VERSION}" \
        -t "${DOCKER_IMAGE}:${IMAGE_TAG}" \
        --provenance=false \
        --sbom=false \
        --push \
        .
      printf '%s\n' "${DOCKER_IMAGE}:${IMAGE_TAG}" > ".published-image-${CI_PIPELINE_ID}"
  after_script:
    - docker buildx rm "csgclaw-ext-${CI_PIPELINE_ID}" 2>/dev/null || true
    - |
      if [ -s ".published-image-${CI_PIPELINE_ID}" ]; then
        image_ref="$(head -n 1 ".published-image-${CI_PIPELINE_ID}")"
        printf '\n'
        printf '======================================================================\n'
        printf '  OPENCLAW IMAGE PUBLISHED\n'
        printf '  %s\n' "${image_ref}"
        printf '======================================================================\n'
      fi
